<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>UNO Party</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #163a62;
      --bg-mid: #285a8c;
      --surface: rgba(28, 58, 98, 0.92);
      --surface-2: #1e4a78;
      --accent: #00d2d3;
      --accent-hot: #e94560;
      --uno-red: #e63946;
      --uno-yellow: #ffd43b;
      --uno-blue: #4dabf7;
      --text: #f8fafc;
      --muted: rgba(248, 250, 252, 0.78);
      --shadow-soft: 0 8px 32px rgba(15, 40, 70, 0.35);
      --shadow-card: 0 12px 28px rgba(15, 35, 60, 0.45);
      --playable-glow: #48dbfb;
      --font-display: 'Fredoka', -apple-system, BlinkMacSystemFont, sans-serif;
      --felt: radial-gradient(ellipse 115% 90% at 50% 95%, #1a6b7a 0%, #1d5a7a 42%, #174066 100%);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-mid);
      background-image:
        repeating-linear-gradient(
          -28deg,
          transparent,
          transparent 14px,
          rgba(255, 255, 255, 0.02) 14px,
          rgba(255, 255, 255, 0.02) 16px
        ),
        radial-gradient(ellipse 90% 55% at 8% 18%, rgba(230, 57, 70, 0.22), transparent 52%),
        radial-gradient(ellipse 75% 50% at 92% 12%, rgba(255, 212, 59, 0.2), transparent 48%),
        radial-gradient(ellipse 70% 45% at 50% 100%, rgba(77, 171, 247, 0.12), transparent 55%),
        linear-gradient(165deg, #1e4a78 0%, var(--bg-mid) 38%, var(--bg-deep) 100%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    /* Lobby */
    #lobby {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    #lobby h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(120deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
      filter: drop-shadow(0 2px 12px rgba(0, 210, 211, 0.15));
    }
    .input-group {
      margin: 15px 0;
      width: 100%;
      max-width: 300px;
    }
    input {
      width: 100%;
      padding: 15px;
      font-size: 1.1rem;
      border: 2px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      text-align: center;
      text-transform: uppercase;
      background: rgba(15, 52, 96, 0.55);
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 210, 211, 0.2);
    }
    button {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      font-size: 1.1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
    }
    button:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(180deg, #1ee8ea 0%, #00b8ba 100%);
      color: #0a1628;
      font-weight: 700;
      font-family: var(--font-display);
      box-shadow: 0 4px 16px rgba(0, 210, 211, 0.35);
    }
    .btn-primary:hover { box-shadow: 0 6px 22px rgba(0, 210, 211, 0.45); }
    .btn-danger {
      background: linear-gradient(180deg, #ff8585 0%, #e94560 100%);
      color: white;
      font-weight: 700;
      font-family: var(--font-display);
      box-shadow: 0 4px 16px rgba(233, 69, 96, 0.35);
    }
    .btn-warning { background: #feca57; color: #1a1a2e; font-weight: 700; }
    
    #roomInfo {
      background: rgba(22, 33, 62, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 24px;
      border-radius: 20px;
      margin: 20px 0;
      text-align: center;
      display: none;
      box-shadow: var(--shadow-soft);
    }
    #playersList { margin: 15px 0; }
    .player-tag {
      display: inline-block;
      padding: 8px 16px;
      margin: 5px;
      background: var(--surface-2);
      border-radius: 999px;
      font-size: 0.9rem;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .player-tag.disconnected { opacity: 0.5; text-decoration: line-through; }
    .player-tag-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin: 5px;
      vertical-align: middle;
    }
    .kick-btn {
      width: auto;
      min-width: 0;
      margin: 0;
      padding: 4px 10px;
      font-size: 0.75rem;
      font-family: var(--font-display);
      font-weight: 600;
      border-radius: 8px;
      background: rgba(233, 69, 96, 0.35);
      color: #ffc9d2;
      border: 1px solid rgba(233, 69, 96, 0.6);
      cursor: pointer;
    }
    .kick-btn:hover { background: rgba(233, 69, 96, 0.55); color: #fff; }
    .opponent-kick {
      margin-top: 8px;
    }
    .opponent-kick .kick-btn {
      padding: 6px 12px;
      font-size: 0.8rem;
    }
    
    /* Game Board */
    #game {
      display: none;
      min-height: 100vh;
      padding: 12px;
      padding-bottom: 180px;
    }
    #topBar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(30, 74, 120, 0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-soft);
    }
    .room-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: var(--surface-2);
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .room-badge-code {
      font-family: ui-monospace, monospace;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--accent);
      letter-spacing: 0.12em;
    }
    #exitBtn {
      flex-shrink: 0;
      width: auto;
      min-width: 0;
      padding: 8px 14px;
      margin: 0;
      font-size: 0.8rem;
      font-family: var(--font-display);
      font-weight: 600;
      border-radius: 999px;
      background: rgba(233, 69, 96, 0.25);
      color: #ffb3c0;
      border: 1px solid rgba(233, 69, 96, 0.55);
      box-shadow: none;
    }
    #exitBtn:hover {
      background: rgba(233, 69, 96, 0.4);
      color: #fff;
    }

    #tableSection {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    #currentColorIndicator {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      background: rgba(26, 80, 128, 0.72);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1);
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    #currentColorIndicator.turn-pulse {
      animation: color-strip-pop 0.55s ease;
    }
    @keyframes color-strip-pop {
      0% { transform: scale(1); }
      40% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }
    .current-color-label {
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
    }
    .current-color-swatch {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.85);
             box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      flex-shrink: 0;
    }
    .current-color-swatch.wild-swatch {
      background: conic-gradient(#ff6b6b, #feca57, #1dd1a1, #48dbfb, #ff6b6b);
    }
    .current-color-name {
      font-weight: 600;
      min-width: 4.5ch;
    }

    #tableMat {
      background: var(--felt);
      border-radius: 24px;
      padding: 28px 24px 32px;
      border: 1px solid rgba(255, 232, 120, 0.12);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.12),
        inset 0 -8px 24px rgba(0, 30, 50, 0.15),
        0 12px 40px rgba(15, 55, 85, 0.4);
      width: 100%;
      max-width: 420px;
    }
    #table {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 28px;
      min-height: 140px;
      position: relative;
    }
    
    /* SVG Cards */
    .card {
      width: 80px;
      height: 120px;
      border-radius: 12px;
      position: relative;
      box-shadow: var(--shadow-card);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    #deckCard, #discardCard {
      animation: card-float 4.5s ease-in-out infinite;
    }
    #discardCard { animation-delay: -2.2s; }
    @keyframes card-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @media (hover: hover) {
      #deckCard:hover, #discardCard:hover {
        transform: translateY(-12px) rotate(-2deg);
        box-shadow: 0 20px 40px rgba(0,0,0,0.45);
      }
    }
    .hand-card.card.playable {
      cursor: pointer;
      animation: playable-pulse 1.25s ease-in-out infinite;
    }
    .hand-card.card.playable:hover {
      transform: translateY(-14px) scale(1.02);
      z-index: 2;
    }
    @keyframes playable-pulse {
      0%, 100% {
        box-shadow:
          0 0 0 2px rgba(255,255,255,0.4),
          0 0 16px var(--playable-glow),
          0 10px 26px rgba(0,0,0,0.38);
      }
      50% {
        box-shadow:
          0 0 0 3px rgba(255,255,255,0.55),
          0 0 26px var(--playable-glow),
          0 16px 34px rgba(0,0,0,0.42);
      }
    }
    
    /* Color picker overlay */
    #colorPickerOverlay {
      position: fixed;
      inset: 0;
      z-index: 150;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(10, 8, 18, 0.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.28s ease, visibility 0.28s;
    }
    #colorPickerOverlay.open {
      visibility: visible;
      opacity: 1;
      pointer-events: auto;
    }
    #colorPickerPanel {
      background: rgba(22, 33, 62, 0.95);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 28px 24px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      transform: scale(0.88);
      opacity: 0;
      transition: transform 0.32s cubic-bezier(0.34, 1.4, 0.64, 1), opacity 0.28s ease;
      max-width: 320px;
    }
    #colorPickerOverlay.open #colorPickerPanel {
      transform: scale(1);
      opacity: 1;
    }
    .color-picker-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      text-align: left;
    }
    .color-picker-header h3 {
      font-family: var(--font-display);
      font-weight: 600;
      margin: 0;
      font-size: 1.35rem;
    }
    #colorPickerCloseBtn {
      flex-shrink: 0;
      width: auto;
      min-width: 0;
      margin: 0;
      padding: 8px 16px;
      font-size: 0.9rem;
      font-family: var(--font-display);
      font-weight: 600;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.25);
      cursor: pointer;
    }
    #colorPickerCloseBtn:hover {
      background: rgba(255, 255, 255, 0.18);
    }
    .color-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin: 10px;
      border: 3px solid rgba(255,255,255,0.9);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }
    .color-btn:active {
      transform: scale(0.9);
    }
    .color-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 28px rgba(0,0,0,0.35);
    }
    
    /* Hand */
    #hand {
      --playable-glow: #48dbfb;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(40, 90, 140, 0.45) 14%,
        rgba(30, 74, 120, 0.94) 35%,
        #1a5080 100%
      );
      padding: 18px 16px;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: calc(env(safe-area-inset-bottom, 16px) + 12px);
      border-top: 1px solid rgba(255, 212, 59, 0.15);
      z-index: 40;
      box-shadow: 0 -12px 40px rgba(22, 60, 100, 0.35);
    }
    #hand::-webkit-scrollbar { height: 8px; }
    #hand::-webkit-scrollbar-thumb { background: var(--accent-hot); border-radius: 4px; }
    
    .hand-card {
      flex-shrink: 0;
      width: 70px;
      height: 105px;
    }
    @keyframes hand-card-enter {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .hand-card.hand-card-enter {
      animation: hand-card-enter 0.4s cubic-bezier(0.34, 1.2, 0.64, 1) backwards;
    }
    
    /* Controls */
    #controls {
      position: fixed;
      bottom: calc(140px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      z-index: 50;
    }
    #drawBtn {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.05rem;
      width: auto;
      min-width: 120px;
      padding: 14px 32px;
      border-radius: 999px;
      background: linear-gradient(180deg, #7aebff 0%, #48dbfb 45%, #2bb5d4 100%);
      color: #0a2530;
      box-shadow:
        0 4px 0 #1a8aa8,
        0 8px 24px rgba(72, 219, 251, 0.35);
      border: 1px solid rgba(255,255,255,0.35);
      transition: transform 0.12s ease, box-shadow 0.2s;
    }
    #drawBtn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #1a8aa8, 0 4px 16px rgba(72, 219, 251, 0.3);
    }
    #drawBtn:hover {
      filter: brightness(1.05);
    }
    
    /* Turn indicator */
    #turnIndicatorWrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      min-width: 0;
    }
    #turnIndicator {
      text-align: right;
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 500;
      color: var(--muted);
      line-height: 1.3;
      transition: color 0.3s ease;
    }
    .turn-timer {
      display: none;
      font-family: var(--font-display);
      font-size: 0.78rem;
      font-variant-numeric: tabular-nums;
      color: rgba(248, 250, 252, 0.55);
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
    .turn-timer.urgent {
      color: #ffb8c3;
      font-weight: 700;
    }
    #turnIndicator.my-turn {
      color: var(--accent);
      font-weight: 700;
      font-size: 1.15rem;
      text-shadow:
        0 0 20px rgba(0, 210, 211, 0.45),
        0 0 40px rgba(0, 210, 211, 0.2);
      animation: turn-glow 2.5s ease-in-out infinite;
    }
    @keyframes turn-glow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.12); }
    }
    #turnIndicator.turn-flash {
      animation: turn-flash 0.65s ease;
    }
    @keyframes turn-flash {
      0% { transform: scale(1); }
      35% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }
    
    /* Stack indicator */
    #stackIndicator {
      position: absolute;
      top: -36px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #ff7b8d, var(--accent-hot));
      padding: 6px 18px;
      border-radius: 999px;
      font-weight: 700;
      font-family: var(--font-display);
      display: none;
      box-shadow: 0 6px 20px rgba(233, 69, 96, 0.4);
      border: 1px solid rgba(255,255,255,0.25);
      animation: stack-pop 0.5s ease;
    }
    @keyframes stack-pop {
      from { transform: translateX(-50%) scale(0.85); opacity: 0; }
      to { transform: translateX(-50%) scale(1); opacity: 1; }
    }
    
    /* Messages */
    #message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.92);
      background: linear-gradient(145deg, #ff6b8b, var(--accent-hot));
      padding: 22px 36px;
      border-radius: 20px;
      font-size: 1.15rem;
      font-weight: 600;
      font-family: var(--font-display);
      z-index: 200;
      box-shadow: 0 20px 50px rgba(233, 69, 96, 0.45);
      border: 1px solid rgba(255,255,255,0.25);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.28s ease, transform 0.32s cubic-bezier(0.34, 1.25, 0.64, 1), visibility 0.28s;
      max-width: min(90vw, 360px);
      text-align: center;
    }
    #message.show {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) scale(1);
    }
    
    /* Opponents */
    #opponents {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .opponent {
      text-align: center;
      padding: 12px 14px;
      background: rgba(30, 74, 120, 0.78);
      backdrop-filter: blur(8px);
      border-radius: 14px;
      min-width: 88px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s;
      font-family: var(--font-display);
    }
    .opponent.active {
      border: 2px solid var(--accent);
      box-shadow:
        0 0 0 1px rgba(0, 210, 211, 0.25),
        0 8px 28px rgba(0, 210, 211, 0.2);
      transform: scale(1.04);
    }
    .opponent.turn-pulse-opponent {
      animation: opponent-pop 0.55s ease;
    }
    @keyframes opponent-pop {
      0% { transform: scale(1); }
      40% { transform: scale(1.08); }
      100% { transform: scale(1.04); }
    }
    .opponent-cards { font-size: 1.45rem; margin-top: 4px; }
    
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      #deckCard, #discardCard { animation: none; }
      .hand-card.card.playable {
        animation: none;
        box-shadow: 0 0 0 2px var(--playable-glow), var(--shadow-card);
      }
      #turnIndicator.my-turn { animation: none; }
    }
    
    /* Desktop tweaks */
    @media (min-width: 768px) {
      .card { width: 100px; height: 150px; }
      .hand-card { width: 90px; height: 135px; }
      #hand { justify-content: center; flex-wrap: wrap; overflow-x: visible; }
      #turnIndicator { font-size: 1.1rem; }
      #turnIndicator.my-turn { font-size: 1.25rem; }
      .turn-timer { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby">
  <h1>🎴 UNO PARTY</h1>
  
  <div id="nameInput">
    <div class="input-group">
      <input type="text" id="playerName" placeholder="YOUR NAME" maxlength="24">
    </div>
    <button class="btn-primary" onclick="showMenu()">Continue</button>
  </div>
  
  <div id="menu" style="display:none;">
    <button class="btn-primary" onclick="createRoom()">Create Room</button>
    <div class="input-group">
      <input type="text" id="roomCode" placeholder="ENTER CODE" maxlength="5">
    </div>
    <button class="btn-primary" onclick="joinRoom()">Join Room</button>
  </div>
  
  <div id="roomInfo">
    <h2>Room: <span id="displayCode"></span></h2>
    <div id="playersList"></div>
    <button id="startBtn" class="btn-danger" onclick="startGame()" style="display:none;">START GAME</button>
    <button type="button" id="leaveRoomLobbyBtn" class="btn-warning" onclick="leaveGame()" style="margin-top:12px">Leave room</button>
    <p id="waitingText">Waiting for host to start...</p>
  </div>
</div>

<!-- GAME -->
<div id="game">
  <div id="topBar">
    <span id="roomCodeDisplay"></span>
    <div id="turnIndicatorWrap">
      <span id="turnIndicator"></span>
      <span id="turnTimerDisplay" class="turn-timer" aria-live="polite"></span>
    </div>
    <button type="button" id="exitBtn" onclick="leaveGame()">Exit</button>
  </div>
  
  <div id="opponents"></div>
  
  <div id="tableSection">
    <div id="currentColorIndicator" aria-live="polite">
      <span class="current-color-label">Match</span>
      <span id="currentColorSwatch" class="current-color-swatch" role="img" aria-hidden="true"></span>
      <span id="currentColorName" class="current-color-name">—</span>
    </div>
    <div id="tableMat">
      <div id="table">
        <div id="stackIndicator">Draw +<span id="stackCount">0</span></div>
        <div id="deckCard" class="card"></div>
        <div id="discardCard" class="card"></div>
      </div>
    </div>
  </div>
  
  <div id="controls">
    <button id="drawBtn" type="button" onclick="drawCard()">DRAW</button>
  </div>
  
  <div id="hand"></div>
</div>

<!-- ColorPicker for Wilds -->
<div id="colorPickerOverlay" onclick="cancelColorPick()">
  <div id="colorPickerPanel" onclick="event.stopPropagation()">
    <div class="color-picker-header">
      <h3>Choose a color</h3>
      <button type="button" id="colorPickerCloseBtn" onclick="cancelColorPick()">Close</button>
    </div>
    <div>
      <button type="button" class="color-btn" style="background:#ff6b6b" onclick="pickColor('red')" aria-label="Red"></button>
      <button type="button" class="color-btn" style="background:#48dbfb" onclick="pickColor('blue')" aria-label="Blue"></button>
    </div>
    <div>
      <button type="button" class="color-btn" style="background:#1dd1a1" onclick="pickColor('green')" aria-label="Green"></button>
      <button type="button" class="color-btn" style="background:#feca57" onclick="pickColor('yellow')" aria-label="Yellow"></button>
    </div>
  </div>
</div>

<div id="message"></div>

<script>
// SVG Card Generator (classic four-color layout; original art, not retail UNO)
function getCardSVG(card, isSmall=false) {
  const w = isSmall ? 70 : 100;
  const h = isSmall ? 105 : 150;
  const fontCard = "Fredoka, system-ui, sans-serif";

  const face = {
    red: '#ff5a5f',
    blue: '#2bb8f5',
    green: '#2dce89',
    yellow: '#ffd43b',
    wild: '#3d3d54'
  };
  const edge = {
    red: '#c92a2a',
    blue: '#1864ab',
    green: '#1b7a4c',
    yellow: '#c9a227',
    wild: '#1e1e2e'
  };
  const bar = {
    red: '#ff6b6b',
    blue: '#48dbfb',
    green: '#1dd1a1',
    yellow: '#feca57'
  };

  const cx = w / 2;
  const cy = h / 2;
  const inset = isSmall ? 4.5 : 6;
  const rxOut = isSmall ? 8 : 11;
  const rxIn = isSmall ? 6 : 9;
  const cream = '#faf6ed';
  const cornerFs = isSmall ? 11 : 15;
  const cornerW = isSmall ? 13 : 17;
  const cornerH = isSmall ? 16 : 20;
  const cxOff = isSmall ? 12 : 16;
  const cyOff = isSmall ? 14 : 20;
  const ovalRx = w * 0.34;
  const ovalRy = h * 0.24;
  const centerFs = isSmall ? 26 : 38;
  const actionFs = isSmall ? 17 : 24;

  function cornerGroup(glyph, colorFill, colorEdge) {
    const gx = cxOff;
    const gy = cyOff;
    const box = `
      <rect x="${gx - cornerW / 2}" y="${gy - cornerH / 2}" width="${cornerW}" height="${cornerH}" rx="3"
        fill="#fff" stroke="${colorEdge}" stroke-width="1.2"/>
      <text x="${gx}" y="${gy + (isSmall ? 3.5 : 5)}" text-anchor="middle" fill="${colorFill}"
        font-size="${cornerFs}" font-weight="700" font-family="${fontCard}">${glyph}</text>`;
    return `${box}
      <g transform="translate(${w},${h}) rotate(180)">${box}</g>`;
  }

  function centerOval(fill, strokeCol) {
    return `<ellipse cx="${cx}" cy="${cy}" rx="${ovalRx}" ry="${ovalRy}" fill="${fill}" stroke="${strokeCol}" stroke-width="${isSmall ? 1.2 : 1.8}"/>`;
  }

  let parts = [];

  if (card.color === 'wild') {
    const barH = card.chosenColor ? (isSmall ? 6 : 8) : 0;
    parts.push(`<rect width="${w}" height="${h}" rx="${rxOut}" fill="${edge.wild}" stroke="#fff" stroke-width="${isSmall ? 1.5 : 2}"/>`);
    parts.push(`<rect x="${inset}" y="${inset}" width="${w - inset * 2}" height="${h - inset * 2}" rx="${rxIn}" fill="${cream}" stroke="#2b2d42" stroke-width="1"/>`);
    if (card.chosenColor) {
      const bc = bar[card.chosenColor];
      parts.push(`<rect x="${inset + 2}" y="${inset + 2}" width="${w - inset * 2 - 4}" height="${barH}" fill="${bc}" rx="2"/>`);
    }
    const ix = inset + 3;
    const iy = card.chosenColor ? inset + 2 + barH + 2 : inset + 4;
    const iw = w - inset * 2 - 6;
    const ih = h - iy - inset - 3;
    const imx = ix + iw / 2;
    const imy = iy + ih / 2;
    parts.push(`<path d="M${ix} ${iy} L${imx} ${iy} L${ix} ${imy} Z" fill="${face.red}"/>`);
    parts.push(`<path d="M${ix + iw} ${iy} L${ix + iw} ${imy} L${imx} ${iy} Z" fill="${face.blue}"/>`);
    parts.push(`<path d="M${ix} ${iy + ih} L${ix} ${imy} L${imx} ${iy + ih} Z" fill="${face.yellow}"/>`);
    parts.push(`<path d="M${ix + iw} ${iy + ih} L${imx} ${iy + ih} L${ix + iw} ${imy} Z" fill="${face.green}"/>`);
    const mid = card.type === '+4' ? '+4' : 'W';
    const midFs = card.type === '+4' ? (isSmall ? 15 : 22) : (isSmall ? 18 : 26);
    parts.push(centerOval('#fff', '#2b2d42'));
    parts.push(`<text x="${cx}" y="${cy + (isSmall ? 5 : 7)}" text-anchor="middle" fill="#2b2d42"
      font-size="${midFs}" font-weight="800" font-family="${fontCard}">${mid}</text>`);
    parts.push(cornerGroup(mid, '#2b2d42', '#2b2d42'));
  } else {
    const c = card.color;
    const f = face[c] || '#888';
    const e = edge[c] || '#333';
    parts.push(`<rect width="${w}" height="${h}" rx="${rxOut}" fill="${e}" stroke="#fff" stroke-width="${isSmall ? 1.5 : 2}"/>`);
    parts.push(`<rect x="${inset}" y="${inset}" width="${w - inset * 2}" height="${h - inset * 2}" rx="${rxIn}" fill="${cream}" stroke="${e}" stroke-width="1.2"/>`);

    let cornerGlyph = '';
    let centerInner = '';

    if (card.type === 'number') {
      cornerGlyph = String(card.value);
      centerInner = centerOval('#fff', e) +
        `<text x="${cx}" y="${cy + (isSmall ? 8 : 11)}" text-anchor="middle" fill="${e}"
          font-size="${centerFs}" font-weight="800" font-family="${fontCard}">${card.value}</text>`;
    } else if (card.type === 'skip') {
      cornerGlyph = '✕';
      const rr = isSmall ? 12 : 18;
      const sw = isSmall ? 2.8 : 3.5;
      centerInner = centerOval('#fff', e) +
        `<g transform="translate(${cx},${cy})">
          <circle r="${rr}" fill="none" stroke="${e}" stroke-width="${sw}"/>
          <line x1="${-rr * 0.65}" y1="0" x2="${rr * 0.65}" y2="0" stroke="${e}" stroke-width="${sw}" transform="rotate(45)"/>
        </g>`;
    } else if (card.type === 'reverse') {
      cornerGlyph = '⇄';
      const s = isSmall ? 0.55 : 0.85;
      centerInner = centerOval('#fff', e) +
        `<g transform="translate(${cx},${cy}) scale(${s})">
          <path d="M -22 0 L -8 -12 L -8 -4 L 8 -4 L 8 -12 L 22 0 L 8 12 L 8 4 L -8 4 L -8 12 Z" fill="${e}"/>
        </g>`;
    } else if (card.type === '+2') {
      cornerGlyph = '+2';
      centerInner = centerOval('#fff', e) +
        `<text x="${cx}" y="${cy + (isSmall ? 5 : 7)}" text-anchor="middle" fill="${e}"
          font-size="${actionFs}" font-weight="800" font-family="${fontCard}">+2</text>`;
    }

    parts.push(centerInner);
    parts.push(cornerGroup(cornerGlyph, e, e));
  }

  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:100%;" xmlns="http://www.w3.org/2000/svg">
    ${parts.join('\n')}
  </svg>`;
}

function getCardBackSVG(isSmall=false) {
  const w = isSmall ? 70 : 100;
  const h = isSmall ? 105 : 150;
  const fontCard = "Fredoka, system-ui, sans-serif";
  const blue = '#1c4f82';
  const blueHi = '#2563a8';
  const red = '#e84d4d';
  const yellow = '#f5cc35';
  const cyan = '#3ecfff';
  const cx = w / 2;
  const cy = h / 2;

  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:100%;" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="backHi" cx="35%" cy="30%" r="65%">
        <stop offset="0%" stop-color="${blueHi}"/>
        <stop offset="100%" stop-color="${blue}"/>
      </radialGradient>
    </defs>
    <rect width="${w}" height="${h}" rx="11" fill="url(#backHi)" stroke="#fff" stroke-width="${isSmall ? 1.5 : 2}"/>
    <rect x="5" y="5" width="${w - 10}" height="${h - 10}" rx="8" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.2"/>
    <path d="M -8 ${h * 0.35} L${w * 0.55} -6 L${w + 6} ${h * 0.2} L${w * 0.4} ${h + 8} Z" fill="${red}" opacity="0.85" transform="translate(0,0)"/>
    <path d="M${w * 0.5} -4 L${w + 10} ${h * 0.45} L${w - 4} ${h + 6} L${w * 0.15} ${h * 0.55} Z" fill="${yellow}" opacity="0.8"/>
    <ellipse cx="${w * 0.82}" cy="${h * 0.75}" rx="${w * 0.35}" ry="${h * 0.22}" fill="${cyan}" opacity="0.35"/>
    <circle cx="${w * 0.18}" cy="${h * 0.72}" r="${isSmall ? 14 : 20}" fill="none" stroke="${yellow}" stroke-width="2.5" opacity="0.9"/>
    <circle cx="${w * 0.78}" cy="${h * 0.28}" r="${isSmall ? 11 : 16}" fill="none" stroke="${red}" stroke-width="2" opacity="0.85"/>
    <circle cx="${cx}" cy="${cy}" r="${isSmall ? 17 : 26}" fill="rgba(15,40,70,0.55)" stroke="#fff" stroke-width="2"/>
    <text x="${cx}" y="${cy + (isSmall ? 4 : 6)}" text-anchor="middle" fill="${yellow}" font-size="${isSmall ? 11 : 15}"
      font-weight="700" font-family="${fontCard}" letter-spacing="0.06em">PARTY</text>
    <circle cx="${cx}" cy="${cy}" r="${isSmall ? 22 : 32}" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  </svg>`;
}

// State
let ws;
let myId;
let myRoomCode;
let myName;
let currentRoom = null;
let selectedCardIndex = null;
let prevMyTurn = null;
let prevTurnPlayerId = null;
let messageTimer = null;
let turnCountdownInterval = null;

function stopTurnCountdown() {
  if (turnCountdownInterval) {
    clearInterval(turnCountdownInterval);
    turnCountdownInterval = null;
  }
  const el = document.getElementById('turnTimerDisplay');
  if (el) {
    el.textContent = '';
    el.className = 'turn-timer';
    el.style.display = 'none';
  }
}

function syncTurnCountdownFromRoom() {
  stopTurnCountdown();
  const el = document.getElementById('turnTimerDisplay');
  if (!el || !currentRoom || !currentRoom.started || !currentRoom.turnEndsAt) {
    if (el) el.style.display = 'none';
    return;
  }
  el.style.display = 'block';
  const tick = () => {
    if (!currentRoom || !currentRoom.turnEndsAt) {
      stopTurnCountdown();
      return;
    }
    const ms = currentRoom.turnEndsAt - Date.now();
    const sec = Math.max(0, Math.ceil(ms / 1000));
    const cur = currentRoom.players[currentRoom.turn];
    const label = cur ? cur.name : '';
    el.textContent = sec > 0
      ? `${label} — auto-draw in ${sec}s`
      : `${label} — auto-draw…`;
    el.className = sec <= 5 ? 'turn-timer urgent' : 'turn-timer';
  };
  tick();
  turnCountdownInterval = setInterval(tick, 250);
}

const COLOR_HEX = {
  red: '#ff6b6b',
  blue: '#48dbfb',
  green: '#1dd1a1',
  yellow: '#feca57',
  wild: '#7986ff'
};

function colorKeyLabel(key) {
  if (!key) return '—';
  if (key === 'wild') return 'Wild';
  return key.charAt(0).toUpperCase() + key.slice(1);
}

function openColorPicker() {
  const ov = document.getElementById('colorPickerOverlay');
  ov.classList.add('open');
}

function closeColorPicker() {
  document.getElementById('colorPickerOverlay').classList.remove('open');
}

function cancelColorPick() {
  closeColorPicker();
  selectedCardIndex = null;
}

// Check for reconnection
const savedId = localStorage.getItem('unoPlayerId');
const savedRoom = localStorage.getItem('unoRoomCode');
const savedName = localStorage.getItem('unoPlayerName');

function connect() {
  const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${window.location.host}`);
  
  ws.onopen = () => {
    if (savedId && savedRoom && savedName) {
      // Try to reconnect
      myName = savedName;
      ws.send(JSON.stringify({
        type: 'reconnect',
        roomCode: savedRoom,
        playerId: savedId
      }));
    }
  };
  
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleMessage(msg);
  };
  
  ws.onclose = () => {
    showMessage('Connection lost. Refresh to reconnect.');
  };
}

function handleMessage(msg) {
  switch(msg.type) {
    case 'created':
      myId = msg.playerId;
      myRoomCode = msg.roomCode;
      currentRoom = msg.room;
      saveSession();
      showRoom();
      break;
      
    case 'joined':
      myId = msg.playerId;
      currentRoom = msg.room;
      saveSession();
      showRoom();
      break;
      
    case 'reconnected':
      currentRoom = msg.room;
      myId = msg.you.id;
      myRoomCode = msg.room.code;
      saveSession();
      if (msg.room.started) {
        showGame();
        updateGameView();
      } else {
        showRoom();
      }
      break;
      
    case 'reconnectFailed':
      clearSession();
      showMessage('Could not reconnect. Starting fresh...');
      setTimeout(() => location.reload(), 2000);
      break;
      
    case 'playerJoined':
    case 'playerLeft':
    case 'playerDisconnected':
    case 'playerReconnected':
      if (msg.room) currentRoom = msg.room;
      if (currentRoom) {
        if (document.getElementById('roomInfo').style.display !== 'none') {
          updatePlayerList();
        } else if (document.getElementById('game').style.display !== 'none') {
          updateGameView();
        }
      }
      const pname = msg.playerName || (msg.player && msg.player.name) || 'Someone';
      let evt = 'reconnected';
      if (msg.type === 'playerJoined') evt = 'joined';
      else if (msg.type === 'playerLeft') evt = msg.reason === 'kick' ? 'was kicked' : 'left';
      else if (msg.type === 'playerDisconnected') evt = 'disconnected';
      showMessage(`${pname} ${evt}!`);
      break;
      
    case 'gameStarted':
      currentRoom = msg.room;
      showGame();
      updateGameView();
      break;
      
    case 'stateUpdate':
      currentRoom = msg.room;
      updateGameView();
      break;

    case 'roundOver':
      stopTurnCountdown();
      showMessage(`${msg.winner} wins this round — next round in a moment!`);
      break;

    case 'newRound':
      currentRoom = msg.room;
      saveSession();
      showGame();
      prevMyTurn = null;
      prevTurnPlayerId = null;
      updateGameView();
      showMessage('New round — good luck!');
      break;

    case 'leftRoom':
      returnToMainMenu();
      showMessage('You left the room.');
      break;

    case 'kicked':
      returnToMainMenu();
      showMessage('You were removed from the room.');
      break;
      
    case 'gameOver':
      stopTurnCountdown();
      if (msg.reason === 'lastPlayer') {
        showMessage(`${msg.winner} wins — last player standing!`);
      } else {
        showMessage(`${msg.winner} wins!`);
      }
      if (msg.final !== false) {
        clearSession();
        setTimeout(() => location.reload(), 5000);
      }
      break;
      
    case 'error':
      showMessage(msg.message);
      break;
  }
}

function saveSession() {
  localStorage.setItem('unoPlayerId', myId);
  localStorage.setItem('unoRoomCode', myRoomCode);
  localStorage.setItem('unoPlayerName', myName);
}

function clearSession() {
  localStorage.removeItem('unoPlayerId');
  localStorage.removeItem('unoRoomCode');
  localStorage.removeItem('unoPlayerName');
}

function returnToMainMenu() {
  stopTurnCountdown();
  const nameKeep = (typeof myName === 'string' && myName) ? myName : (localStorage.getItem('unoPlayerName') || '');
  clearSession();
  if (nameKeep) {
    myName = nameKeep;
    localStorage.setItem('unoPlayerName', nameKeep);
    const nameInput = document.getElementById('playerName');
    if (nameInput) nameInput.value = nameKeep;
  }
  currentRoom = null;
  myId = null;
  myRoomCode = null;
  prevMyTurn = null;
  prevTurnPlayerId = null;
  selectedCardIndex = null;
  closeColorPicker();
  document.getElementById('game').style.display = 'none';
  document.getElementById('lobby').style.display = 'flex';
  document.getElementById('roomInfo').style.display = 'none';
  document.getElementById('nameInput').style.display = 'block';
  document.getElementById('menu').style.display = 'none';
}

function leaveGame() {
  if (!myRoomCode || !myId || ws.readyState !== WebSocket.OPEN) return;
  const inGame = document.getElementById('game').style.display === 'block' && currentRoom && currentRoom.started;
  if (!confirm(inGame
    ? 'Leave the game? Your cards are shuffled back into the deck.'
    : 'Leave this room?')) return;
  ws.send(JSON.stringify({ type: 'leave', roomCode: myRoomCode, playerId: myId }));
}

function showMenu() {
  myName = document.getElementById('playerName').value.trim().toUpperCase();
  if (!myName) return;
  document.getElementById('nameInput').style.display = 'none';
  document.getElementById('menu').style.display = 'block';
}

function createRoom() {
  ws.send(JSON.stringify({type: 'create', playerName: myName}));
}

function joinRoom() {
  const code = document.getElementById('roomCode').value.trim().toUpperCase();
  if (!code) return;
  myRoomCode = code;
  ws.send(JSON.stringify({type: 'join', roomCode: code, playerName: myName}));
}

function showRoom() {
  document.getElementById('lobby').querySelector('#nameInput').style.display = 'none';
  document.getElementById('menu').style.display = 'none';
  document.getElementById('roomInfo').style.display = 'block';
  document.getElementById('displayCode').textContent = myRoomCode;
  updatePlayerList();
  
  const isHost = currentRoom.hostId === myId;
  document.getElementById('startBtn').style.display = isHost && currentRoom.players.length >= 2 ? 'block' : 'none';
  document.getElementById('waitingText').style.display = isHost ? 'none' : 'block';
}

function updatePlayerList() {
  const list = document.getElementById('playersList');
  const isHost = currentRoom.hostId === myId;
  list.innerHTML = currentRoom.players.map(p => {
    const tag = `<span class="player-tag ${p.connected ? '' : 'disconnected'}">${p.name} ${p.id === currentRoom.hostId ? '👑' : ''}</span>`;
    const kick = isHost && p.id !== myId
      ? `<button type="button" class="kick-btn" onclick="kickPlayer('${p.id}')">Kick</button>`
      : '';
    return `<div class="player-tag-row">${tag}${kick}</div>`;
  }).join('');
  document.getElementById('startBtn').style.display = isHost && currentRoom.players.length >= 2 ? 'block' : 'none';
  document.getElementById('waitingText').style.display = isHost ? 'none' : 'block';
}

function kickPlayer(targetPlayerId) {
  if (!myRoomCode || !myId || !currentRoom || currentRoom.hostId !== myId) return;
  if (!targetPlayerId || targetPlayerId === myId) return;
  if (!confirm('Remove this player from the room? Their cards return to the deck.')) return;
  ws.send(JSON.stringify({
    type: 'kick',
    roomCode: myRoomCode,
    playerId: myId,
    targetPlayerId
  }));
}

function startGame() {
  ws.send(JSON.stringify({type: 'start', roomCode: myRoomCode, playerId: myId}));
}

function showGame() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  document.getElementById('roomCodeDisplay').innerHTML =
    `<span class="room-badge"><span>Room</span><span class="room-badge-code">${myRoomCode}</span></span>`;
}

function updateGameView() {
  if (!currentRoom || !currentRoom.players || !currentRoom.discard || !currentRoom.discard.length) {
    stopTurnCountdown();
    return;
  }
  const me = currentRoom.players.find(p => p.id === myId);
  if (!me) {
    stopTurnCountdown();
    return;
  }
  const isMyTurn = currentRoom.players[currentRoom.turn].id === myId;
  const currentPlayer = currentRoom.players[currentRoom.turn];
  const currentTurnId = currentPlayer.id;
  const turnChanged = prevTurnPlayerId !== null && prevTurnPlayerId !== currentTurnId;

  const turnEl = document.getElementById('turnIndicator');
  turnEl.textContent = isMyTurn ? 'YOUR TURN!' : `${currentPlayer.name}'s turn`;
  turnEl.className = isMyTurn ? 'my-turn' : '';
  if (prevMyTurn !== null && prevMyTurn !== isMyTurn) {
    turnEl.classList.add('turn-flash');
    setTimeout(() => turnEl.classList.remove('turn-flash'), 700);
  }
  prevMyTurn = isMyTurn;

  const opponentsEl = document.getElementById('opponents');
  const myIndex = currentRoom.players.findIndex(p => p.id === myId);
  const hostHere = currentRoom.hostId === myId;
  const opponents = [];
  for (let i = 1; i < currentRoom.players.length; i++) {
    const idx = (myIndex + i) % currentRoom.players.length;
    opponents.push(currentRoom.players[idx]);
  }
  opponentsEl.innerHTML = opponents.map((p, i) => `
    <div class="opponent ${p.id === currentPlayer.id ? 'active' : ''}">
      <div>${p.name}</div>
      <div class="opponent-cards">🂠${p.hand.length}</div>
      ${hostHere && p.id !== myId ? `<div class="opponent-kick"><button type="button" class="kick-btn" onclick="kickPlayer('${p.id}')">Kick</button></div>` : ''}
    </div>
  `).join('');
  if (turnChanged) {
    const activeOpp = opponentsEl.querySelector('.opponent.active');
    if (activeOpp) {
      activeOpp.classList.add('turn-pulse-opponent');
      setTimeout(() => activeOpp.classList.remove('turn-pulse-opponent'), 600);
    }
  }
  prevTurnPlayerId = currentTurnId;

  const topCardObj = currentRoom.discard[currentRoom.discard.length - 1];
  document.getElementById('deckCard').innerHTML = getCardBackSVG();
  document.getElementById('discardCard').innerHTML = getCardSVG(topCardObj);

  const eff = effectiveTopColor(topCardObj);
  const handEl = document.getElementById('hand');
  handEl.style.setProperty('--playable-glow', COLOR_HEX[eff] || '#48dbfb');

  const swatch = document.getElementById('currentColorSwatch');
  const nameEl = document.getElementById('currentColorName');
  const strip = document.getElementById('currentColorIndicator');
  if (topCardObj.color === 'wild' && !topCardObj.chosenColor) {
    swatch.classList.add('wild-swatch');
    swatch.style.background = 'transparent';
    nameEl.textContent = 'Wild';
  } else {
    swatch.classList.remove('wild-swatch');
    swatch.style.background = COLOR_HEX[eff] || '#666';
    nameEl.textContent = colorKeyLabel(eff);
  }
  if (turnChanged) {
    strip.classList.add('turn-pulse');
    setTimeout(() => strip.classList.remove('turn-pulse'), 600);
  }

  const stackEl = document.getElementById('stackIndicator');
  if (currentRoom.drawStack > 0) {
    stackEl.style.display = 'block';
    document.getElementById('stackCount').textContent = currentRoom.drawStack;
  } else {
    stackEl.style.display = 'none';
  }

  handEl.innerHTML = me.hand.map((card, i) => {
    const canPlay = isMyTurn && canPlayCard(card, topCardObj, currentRoom.drawStack);
    const delay = Math.min(i * 0.045, 0.55);
    return `<div class="hand-card card hand-card-enter ${canPlay ? 'playable' : ''}" 
                 style="animation-delay: ${delay}s"
                 onclick="${canPlay ? `playCard(${i})` : ''}">
      ${getCardSVG(card, true)}
    </div>`;
  }).join('');

  document.getElementById('drawBtn').style.display = isMyTurn ? 'block' : 'none';

  syncTurnCountdownFromRoom();
}

function effectiveTopColor(topCard) {
  if (topCard.color === 'wild' && topCard.chosenColor) {
    return topCard.chosenColor;
  }
  return topCard.color;
}

function canPlayCard(card, topCard, stack) {
  if (stack > 0) {
    return (card.type === '+2' && topCard.type === '+2') ||
           (card.type === '+4' && topCard.type === '+4');
  }
  if (card.color === 'wild') return true;
  const topColor = effectiveTopColor(topCard);
  return card.color === topColor ||
         (card.type === topCard.type && card.type !== 'number') ||
         (card.type === 'number' && card.value === topCard.value);
}

function playCard(index) {
  const card = currentRoom.players.find(p => p.id === myId).hand[index];
  
  if (card.color === 'wild') {
    selectedCardIndex = index;
    openColorPicker();
    return;
  }
  
  ws.send(JSON.stringify({
    type: 'play',
    roomCode: myRoomCode,
    playerId: myId,
    cardIndex: index
  }));
}

function pickColor(color) {
  if (selectedCardIndex === null || selectedCardIndex === undefined) return;
  closeColorPicker();
  ws.send(JSON.stringify({
    type: 'play',
    roomCode: myRoomCode,
    playerId: myId,
    cardIndex: selectedCardIndex,
    chosenColor: color
  }));
  selectedCardIndex = null;
}

function drawCard() {
  ws.send(JSON.stringify({
    type: 'draw',
    roomCode: myRoomCode,
    playerId: myId
  }));
}

function showMessage(text) {
  const el = document.getElementById('message');
  clearTimeout(messageTimer);
  el.textContent = text;
  el.classList.add('show');
  messageTimer = setTimeout(() => {
    el.classList.remove('show');
  }, 3000);
}

// Initialize
connect();
</script>
